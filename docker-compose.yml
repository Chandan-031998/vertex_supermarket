version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: vertex_supermarket_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vertex_supermarket
      MYSQL_USER: vertex
      MYSQL_PASSWORD: vertex123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: vertex_supermarket_backend
    depends_on:
      - mysql
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://vertex:vertex123@mysql:3306/vertex_supermarket
      JWT_ACCESS_SECRET: change_this_access_secret
      JWT_REFRESH_SECRET: change_this_refresh_secret
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: vertex_supermarket_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    ports:
      - "5173:80"

volumes:
  mysql_data:
